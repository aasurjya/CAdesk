<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="p1-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="p2-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="p3-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="f">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="1100" height="520" fill="#F8FAFC" rx="12"/>
  <text x="550" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#0F172A">Implementation Phases</text>
  <text x="550" y="58" text-anchor="middle" font-size="12" fill="#64748B">Progressive rollout: Foundation → Portal Integration → Full Automation</text>

  <!-- Timeline bar -->
  <rect x="50" y="75" width="1000" height="8" rx="4" fill="#E2E8F0"/>
  <rect x="50" y="75" width="300" height="8" rx="4" fill="url(#p1-grad)"/>
  <rect x="350" y="75" width="330" height="8" rx="4" fill="url(#p2-grad)"/>
  <rect x="680" y="75" width="370" height="8" rx="4" fill="url(#p3-grad)"/>

  <!-- Phase markers -->
  <circle cx="50" cy="79" r="6" fill="#3B82F6" stroke="#fff" stroke-width="2"/>
