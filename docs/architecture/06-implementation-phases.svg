  <text x="64" y="362" font-size="10" fill="#334155">ClientRepositoryImpl (first real)</text>
  <rect x="48" y="372" width="8" height="8" rx="2" fill="#3B82F6"/>
  <text x="64" y="380" font-size="10" fill="#334155">Sentry + Prometheus + logging</text>
  <rect x="48" y="390" width="8" height="8" rx="2" fill="#3B82F6"/>
  <text x="64" y="398" font-size="10" fill="#334155">GitHub Actions (Flutter + Go CI)</text>

