  <rect x="748" y="264" width="8" height="8" rx="2" fill="#10B981"/>
  <text x="764" y="272" font-size="10" fill="#334155">EPFO RPA integration</text>
  <rect x="748" y="282" width="8" height="8" rx="2" fill="#10B981"/>
  <text x="764" y="290" font-size="10" fill="#334155">Data pipelines (GSTR-2B, 26AS, IRN)</text>
  <rect x="748" y="300" width="8" height="8" rx="2" fill="#10B981"/>
  <text x="764" y="308" font-size="10" fill="#334155">Full sync engine + conflict UI</text>
  <rect x="748" y="318" width="8" height="8" rx="2" fill="#10B981"/>
  <text x="764" y="326" font-size="10" fill="#334155">DPDP Act compliance</text>
  <rect x="748" y="336" width="8" height="8" rx="2" fill="#10B981"/>
  <text x="764" y="344" font-size="10" fill="#334155">iOS TestFlight (Fastlane)</text>
  <rect x="748" y="354" width="8" height="8" rx="2" fill="#10B981"/>
  <text x="764" y="362" font-size="10" fill="#334155">Filing season surge plan</text>
  <rect x="748" y="372" width="8" height="8" rx="2" fill="#10B981"/>
  <text x="764" y="380" font-size="10" fill="#334155">Alerting + runbooks + on-call</text>
  <rect x="748" y="390" width="8" height="8" rx="2" fill="#10B981"/>
  <text x="764" y="398" font-size="10" fill="#334155">Load test (50K req/min target)</text>

  <rect x="745" y="420" width="310" height="35" rx="6" fill="#D1FAE5" stroke="#86EFAC" stroke-width="1"/>
  <text x="900" y="436" text-anchor="middle" font-size="9" font-weight="700" fill="#065F46">EXIT: 74/74 modules, &lt;200ms p95, DLQ &lt;10</text>
  <text x="900" y="449" text-anchor="middle" font-size="9" fill="#10B981">Modules with real impl: 74 / 74</text>

  <rect x="745" y="462" width="310" height="25" rx="4" fill="#fff" stroke="#86EFAC" stroke-width="1"/>
  <text x="900" y="479" text-anchor="middle" font-size="9" fill="#64748B">5,000 users | 50K req/min | &lt;200ms p95 | 99.9% uptime</text>
