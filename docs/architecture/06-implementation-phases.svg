  <text x="395" y="175" font-size="11" font-weight="700" fill="#92400E">Goal</text>
  <text x="395" y="193" font-size="10" fill="#334155">Govt portal access via Go proxy</text>

  <text x="395" y="220" font-size="11" font-weight="700" fill="#92400E">Deliverables</text>
