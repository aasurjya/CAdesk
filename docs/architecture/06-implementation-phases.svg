  <text x="900" y="140" text-anchor="middle" font-size="10" fill="#D1FAE5">4-6 sprints</text>

  <text x="750" y="175" font-size="11" font-weight="700" fill="#065F46">Goal</text>
  <text x="750" y="193" font-size="10" fill="#334155">All 74 modules live, batch ops working</text>

  <text x="750" y="220" font-size="11" font-weight="700" fill="#065F46">Deliverables</text>
  <rect x="748" y="228" width="8" height="8" rx="2" fill="#10B981"/>
  <text x="764" y="236" font-size="10" fill="#334155">Remaining 64 *RepositoryImpl</text>
  <rect x="748" y="246" width="8" height="8" rx="2" fill="#10B981"/>
