  <circle cx="680" cy="79" r="6" fill="#10B981" stroke="#fff" stroke-width="2"/>
  <circle cx="1050" cy="79" r="6" fill="#10B981" stroke="#fff" stroke-width="2"/>

  <!-- ==================== PHASE 1 ==================== -->
  <rect x="30" y="100" width="320" height="400" rx="16" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2" filter="url(#f)"/>
  <rect x="30" y="100" width="320" height="50" rx="16" fill="url(#p1-grad)"/>
  <rect x="30" y="134" width="320" height="16" fill="url(#p1-grad)"/>
  <text x="190" y="122" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Phase 1 — Foundation</text>
  <text x="190" y="140" text-anchor="middle" font-size="10" fill="#BFDBFE">2-3 sprints</text>

  <text x="50" y="175" font-size="11" font-weight="700" fill="#1E40AF">Goal</text>
  <text x="50" y="193" font-size="10" fill="#334155">End-to-end flow for 1 module (clients)</text>

  <text x="50" y="220" font-size="11" font-weight="700" fill="#1E40AF">Deliverables</text>
  <rect x="48" y="228" width="8" height="8" rx="2" fill="#3B82F6"/>
  <text x="64" y="236" font-size="10" fill="#334155">Go backend (chi + Fly.io Mumbai)</text>
