  <text x="409" y="326" font-size="10" fill="#334155">ITD RPA (return status)</text>
  <rect x="393" y="336" width="8" height="8" rx="2" fill="#F59E0B"/>
  <text x="409" y="344" font-size="10" fill="#334155">Redis job queue + DLQ</text>
  <rect x="393" y="354" width="8" height="8" rx="2" fill="#F59E0B"/>
  <text x="409" y="362" font-size="10" fill="#334155">R2 storage + presigned URLs</text>
  <rect x="393" y="372" width="8" height="8" rx="2" fill="#F59E0B"/>
  <text x="409" y="380" font-size="10" fill="#334155">Supabase Realtime + polling fallback</text>
  <rect x="393" y="390" width="8" height="8" rx="2" fill="#F59E0B"/>
  <text x="409" y="398" font-size="10" fill="#334155">RPA health monitoring + smoke tests</text>

  <rect x="390" y="420" width="300" height="35" rx="6" fill="#FEF3C7" stroke="#FDE68A" stroke-width="1"/>
  <text x="540" y="436" text-anchor="middle" font-size="9" font-weight="700" fill="#92400E">EXIT: File GSTR-1, download Form 16</text>
  <text x="540" y="449" text-anchor="middle" font-size="9" fill="#D97706">Modules with real impl: 10 / 74</text>

  <rect x="390" y="462" width="300" height="25" rx="4" fill="#fff" stroke="#FDE68A" stroke-width="1"/>
  <text x="540" y="479" text-anchor="middle" font-size="9" fill="#64748B">500 users | 5K req/min | &lt;300ms p95</text>

