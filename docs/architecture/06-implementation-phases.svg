  <rect x="730" y="100" width="340" height="400" rx="16" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2" filter="url(#f)"/>
  <rect x="730" y="100" width="340" height="50" rx="16" fill="url(#p3-grad)"/>
  <rect x="730" y="134" width="340" height="16" fill="url(#p3-grad)"/>
