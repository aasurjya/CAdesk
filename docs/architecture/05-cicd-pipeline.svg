<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 550" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="gh-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#24292E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#444D56;stop-opacity:1" />
    </linearGradient>
    <filter id="ds">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="1100" height="550" fill="#F8FAFC" rx="12"/>
  <text x="550" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#0F172A">CI/CD Pipeline — All Repos</text>
  <text x="550" y="58" text-anchor="middle" font-size="12" fill="#64748B">GitHub Actions → Test → Build → Deploy</text>

  <!-- ==================== FLUTTER PIPELINE ==================== -->
  <rect x="30" y="80" width="1040" height="100" rx="12" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2" filter="url(#ds)"/>
  <rect x="30" y="80" width="130" height="100" rx="12" fill="#3B82F6"/>
  <rect x="145" y="80" width="15" height="100" fill="#3B82F6"/>
  <text x="90" y="125" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Flutter</text>
  <text x="90" y="143" text-anchor="middle" font-size="9" fill="#BFDBFE">CA-app</text>

  <!-- Steps -->
  <rect x="185" y="97" width="110" height="50" rx="8" fill="#fff" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="240" y="118" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">flutter analyze</text>
  <text x="240" y="135" text-anchor="middle" font-size="8" fill="#64748B">--fatal-infos</text>

  <line x1="295" y1="122" x2="315" y2="122" stroke="#64748B" stroke-width="1.5" marker-end="url(#m)"/>

  <rect x="320" y="97" width="110" height="50" rx="8" fill="#fff" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="375" y="118" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">flutter test</text>
  <text x="375" y="135" text-anchor="middle" font-size="8" fill="#64748B">--coverage</text>

  <line x1="430" y1="122" x2="450" y2="122" stroke="#64748B" stroke-width="1.5" marker-end="url(#m)"/>

  <rect x="455" y="97" width="110" height="50" rx="8" fill="#FEF9C3" stroke="#FDE047" stroke-width="1.5"/>
  <text x="510" y="118" text-anchor="middle" font-size="9" font-weight="600" fill="#854D0E">Coverage Gate</text>
  <text x="510" y="135" text-anchor="middle" font-size="8" fill="#92400E">BLOCKING</text>

  <line x1="565" y1="122" x2="585" y2="122" stroke="#64748B" stroke-width="1.5" marker-end="url(#m)"/>

  <rect x="590" y="97" width="120" height="50" rx="8" fill="#fff" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="650" y="118" text-anchor="middle" font-size="9" font-weight="600" fill="#1E40AF">flutter build web</text>
  <text x="650" y="135" text-anchor="middle" font-size="8" fill="#64748B">--release</text>

  <line x1="710" y1="122" x2="730" y2="122" stroke="#64748B" stroke-width="1.5" marker-end="url(#m)"/>

  <rect x="735" y="97" width="130" height="50" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="800" y="113" text-anchor="middle" font-size="9" font-weight="600" fill="#065F46">Cloudflare Pages</text>
  <text x="800" y="130" text-anchor="middle" font-size="8" fill="#10B981">Deploy (main only)</text>
  <text x="800" y="143" text-anchor="middle" font-size="8" fill="#64748B">+ Sentry symbols</text>

  <line x1="865" y1="122" x2="885" y2="122" stroke="#64748B" stroke-width="1.5" marker-end="url(#m)"/>

  <rect x="890" y="92" width="160" height="60" rx="8" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="970" y="113" text-anchor="middle" font-size="9" font-weight="600" fill="#5B21B6">iOS TestFlight</text>
  <text x="970" y="130" text-anchor="middle" font-size="8" fill="#7C3AED">Fastlane pilot upload</text>
  <text x="970" y="143" text-anchor="middle" font-size="8" fill="#64748B">Tag push only (v*.*.*)</text>

  <!-- ==================== GO PIPELINE ==================== -->
  <rect x="30" y="200" width="1040" height="100" rx="12" fill="#ECFEFF" stroke="#A5F3FC" stroke-width="2" filter="url(#ds)"/>
  <rect x="30" y="200" width="130" height="100" rx="12" fill="#0891B2"/>
  <rect x="145" y="200" width="15" height="100" fill="#0891B2"/>
  <text x="90" y="245" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Go API</text>
  <text x="90" y="263" text-anchor="middle" font-size="9" fill="#A5F3FC">CA-app-backend</text>

  <rect x="185" y="217" width="110" height="50" rx="8" fill="#fff" stroke="#67E8F9" stroke-width="1.5"/>
  <text x="240" y="238" text-anchor="middle" font-size="9" font-weight="600" fill="#0E7490">golangci-lint</text>
  <text x="240" y="255" text-anchor="middle" font-size="8" fill="#64748B">run ./...</text>

  <line x1="295" y1="242" x2="315" y2="242" stroke="#64748B" stroke-width="1.5" marker-end="url(#m)"/>

  <rect x="320" y="217" width="130" height="50" rx="8" fill="#fff" stroke="#67E8F9" stroke-width="1.5"/>
  <text x="385" y="238" text-anchor="middle" font-size="9" font-weight="600" fill="#0E7490">go test -race</text>
  <text x="385" y="255" text-anchor="middle" font-size="8" fill="#64748B">-coverprofile ./...</text>

  <line x1="450" y1="242" x2="470" y2="242" stroke="#64748B" stroke-width="1.5" marker-end="url(#m)"/>

  <rect x="475" y="217" width="110" height="50" rx="8" fill="#fff" stroke="#67E8F9" stroke-width="1.5"/>
  <text x="530" y="238" text-anchor="middle" font-size="9" font-weight="600" fill="#0E7490">go build</text>
  <text x="530" y="255" text-anchor="middle" font-size="8" fill="#64748B">./cmd/server</text>

  <line x1="585" y1="242" x2="605" y2="242" stroke="#64748B" stroke-width="1.5" marker-end="url(#m)"/>

  <rect x="610" y="217" width="120" height="50" rx="8" fill="#fff" stroke="#67E8F9" stroke-width="1.5"/>
  <text x="670" y="238" text-anchor="middle" font-size="9" font-weight="600" fill="#0E7490">docker build</text>
  <text x="670" y="255" text-anchor="middle" font-size="8" fill="#64748B">verify container</text>

  <line x1="730" y1="242" x2="750" y2="242" stroke="#64748B" stroke-width="1.5" marker-end="url(#m)"/>

  <rect x="755" y="217" width="130" height="50" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="820" y="238" text-anchor="middle" font-size="9" font-weight="600" fill="#065F46">Fly.io Deploy</text>
  <text x="820" y="255" text-anchor="middle" font-size="8" fill="#10B981">Mumbai (main only)</text>

  <!-- ==================== RPA PIPELINE ==================== -->
  <rect x="30" y="320" width="700" height="100" rx="12" fill="#FFF1F2" stroke="#FECDD3" stroke-width="2" filter="url(#ds)"/>
  <rect x="30" y="320" width="130" height="100" rx="12" fill="#E44D26"/>
  <rect x="145" y="320" width="15" height="100" fill="#E44D26"/>
  <text x="90" y="365" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Playwright</text>
  <text x="90" y="383" text-anchor="middle" font-size="9" fill="#FECDD3">CA-app-rpa</text>

  <rect x="185" y="337" width="110" height="50" rx="8" fill="#fff" stroke="#FDA4AF" stroke-width="1.5"/>
  <text x="240" y="358" text-anchor="middle" font-size="9" font-weight="600" fill="#9F1239">npm ci</text>
  <text x="240" y="375" text-anchor="middle" font-size="8" fill="#64748B">+ npm test</text>

  <line x1="295" y1="362" x2="315" y2="362" stroke="#64748B" stroke-width="1.5" marker-end="url(#m)"/>

  <rect x="320" y="337" width="130" height="50" rx="8" fill="#fff" stroke="#FDA4AF" stroke-width="1.5"/>
  <text x="385" y="358" text-anchor="middle" font-size="9" font-weight="600" fill="#9F1239">docker build</text>
  <text x="385" y="375" text-anchor="middle" font-size="8" fill="#64748B">cadesk-rpa image</text>

  <line x1="450" y1="362" x2="470" y2="362" stroke="#64748B" stroke-width="1.5" marker-end="url(#m)"/>

  <rect x="475" y="337" width="130" height="50" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="540" y="358" text-anchor="middle" font-size="9" font-weight="600" fill="#065F46">Fly.io Deploy</text>
  <text x="540" y="375" text-anchor="middle" font-size="8" fill="#10B981">Mumbai (main only)</text>

  <!-- ==================== SUPABASE PIPELINE ==================== -->
  <rect x="30" y="440" width="700" height="90" rx="12" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2" filter="url(#ds)"/>
  <rect x="30" y="440" width="130" height="90" rx="12" fill="#10B981"/>
  <rect x="145" y="440" width="15" height="90" fill="#10B981"/>
  <text x="90" y="480" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Supabase</text>
  <text x="90" y="498" text-anchor="middle" font-size="9" fill="#D1FAE5">Migrations</text>

  <rect x="185" y="457" width="140" height="50" rx="8" fill="#fff" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="255" y="478" text-anchor="middle" font-size="9" font-weight="600" fill="#065F46">supabase db push</text>
  <text x="255" y="495" text-anchor="middle" font-size="8" fill="#64748B">--linked (main only)</text>

  <line x1="325" y1="482" x2="345" y2="482" stroke="#64748B" stroke-width="1.5" marker-end="url(#m)"/>

  <rect x="350" y="457" width="160" height="50" rx="8" fill="#FEF9C3" stroke="#FDE047" stroke-width="1.5"/>
  <text x="430" y="478" text-anchor="middle" font-size="9" font-weight="600" fill="#854D0E">Verify RLS Policies</text>
  <text x="430" y="495" text-anchor="middle" font-size="8" fill="#92400E">All new tables must have RLS</text>

  <!-- ==================== TRIGGER LABELS ==================== -->
  <rect x="780" y="330" width="280" height="200" rx="12" fill="#fff" stroke="#E2E8F0" stroke-width="2" filter="url(#ds)"/>
  <text x="920" y="355" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Triggers</text>

  <rect x="800" y="370" width="12" height="12" rx="2" fill="#3B82F6"/>
  <text x="822" y="381" font-size="10" fill="#334155">Flutter: push, PR (all branches)</text>

  <rect x="800" y="395" width="12" height="12" rx="2" fill="#0891B2"/>
  <text x="822" y="406" font-size="10" fill="#334155">Go: push, PR (all branches)</text>

  <rect x="800" y="420" width="12" height="12" rx="2" fill="#E44D26"/>
  <text x="822" y="431" font-size="10" fill="#334155">RPA: push, PR (all branches)</text>

  <rect x="800" y="445" width="12" height="12" rx="2" fill="#10B981"/>
  <text x="822" y="456" font-size="10" fill="#334155">Supabase: push to main only</text>

  <rect x="800" y="475" width="12" height="12" rx="2" fill="#7C3AED"/>
  <text x="822" y="486" font-size="10" fill="#334155">iOS: tag push (v*.*.*) only</text>

  <text x="800" y="515" font-size="10" font-weight="600" fill="#DC2626">Deploy only happens on main merge</text>
</svg>