<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 680" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="rpa-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E44D26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F97316"/>
    </marker>
    <marker id="ar-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6"/>
    </marker>
    <marker id="ar-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10B981"/>
    </marker>
    <marker id="ar-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EF4444"/>
    </marker>
    <filter id="sd">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1100" height="680" fill="#F8FAFC" rx="12"/>
  <text x="550" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#0F172A">RPA Pipeline — Portal Automation</text>
  <text x="550" y="58" text-anchor="middle" font-size="12" fill="#64748B">Async job queue with circuit breakers, DLQ, and failure capture</text>

  <!-- ==================== SWIM LANES ==================== -->

  <!-- Lane headers -->
  <rect x="30" y="85" width="150" height="30" rx="6" fill="#3B82F6"/>
  <text x="105" y="105" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Flutter App</text>

  <rect x="30" y="175" width="150" height="30" rx="6" fill="#0891B2"/>
  <text x="105" y="195" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Go API Gateway</text>

  <rect x="30" y="325" width="150" height="30" rx="6" fill="#DC2626"/>
  <text x="105" y="345" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Redis Queue</text>

  <rect x="30" y="425" width="150" height="30" rx="6" fill="#E44D26"/>
  <text x="105" y="445" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Playwright RPA</text>

  <rect x="30" y="555" width="150" height="30" rx="6" fill="#10B981"/>
  <text x="105" y="575" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Storage &amp; DB</text>

  <!-- Lane lines -->
  <line x1="180" y1="85" x2="1070" y2="85" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="180" y1="165" x2="1070" y2="165" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="180" y1="315" x2="1070" y2="315" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="180" y1="415" x2="1070" y2="415" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="180" y1="545" x2="1070" y2="545" stroke="#E2E8F0" stroke-width="1"/>

  <!-- ==================== HAPPY PATH ==================== -->

  <!-- Step 1: User submits job -->
  <rect x="210" y="95" width="140" height="55" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5" filter="url(#sd)"/>
  <text x="280" y="117" text-anchor="middle" font-size="10" font-weight="700" fill="#1E40AF">1. Submit Job</text>
  <text x="280" y="133" text-anchor="middle" font-size="9" fill="#3B82F6">POST /v1/jobs</text>
  <text x="280" y="145" text-anchor="middle" font-size="8" fill="#64748B">+ Idempotency-Key</text>

  <!-- Arrow 1→2 -->
  <line x1="280" y1="150" x2="280" y2="185" stroke="#3B82F6" stroke-width="2" marker-end="url(#ar-blue)"/>

  <!-- Step 2: Go validates + queues -->
  <rect x="210" y="190" width="160" height="110" rx="8" fill="#ECFEFF" stroke="#A5F3FC" stroke-width="1.5" filter="url(#sd)"/>
  <text x="290" y="212" text-anchor="middle" font-size="10" font-weight="700" fill="#0E7490">2. Validate &amp; Queue</text>
  <text x="220" y="232" font-size="9" fill="#334155">Check idempotency key</text>
  <text x="220" y="248" font-size="9" fill="#334155">Validate JWT + role</text>
  <text x="220" y="264" font-size="9" fill="#334155">Check circuit breaker</text>
  <text x="220" y="280" font-size="9" fill="#334155">Fetch creds from Vault</text>
  <text x="220" y="296" font-size="9" fill="#334155">ZADD to rpa:queue</text>

  <!-- Arrow 2→3 -->
  <line x1="290" y1="300" x2="290" y2="330" stroke="#F97316" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Step 3: Redis queue -->
  <rect x="210" y="335" width="160" height="65" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5" filter="url(#sd)"/>
  <text x="290" y="357" text-anchor="middle" font-size="10" font-weight="700" fill="#DC2626">3. Priority Queue</text>
  <text x="220" y="377" font-size="9" fill="#334155">Sorted set by priority</text>
  <text x="220" y="393" font-size="9" fill="#334155">Score = timestamp + urgency</text>

  <!-- Arrow 3→4 -->
  <line x1="290" y1="400" x2="290" y2="435" stroke="#E44D26" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Step 4: Playwright executes -->
  <rect x="210" y="440" width="180" height="95" rx="8" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1.5" filter="url(#sd)"/>
  <text x="300" y="462" text-anchor="middle" font-size="10" font-weight="700" fill="#9F1239">4. Execute RPA</text>
  <text x="220" y="482" font-size="9" fill="#334155">Pop job from queue</text>
  <text x="220" y="498" font-size="9" fill="#334155">Checksum DOM selectors</text>
  <text x="220" y="514" font-size="9" fill="#334155">Launch browser → login</text>
  <text x="220" y="530" font-size="9" fill="#334155">Navigate → download PDF</text>

  <!-- Arrow 4→5 (success) -->
  <line x1="300" y1="535" x2="300" y2="560" stroke="#10B981" stroke-width="2" marker-end="url(#ar-green)"/>

  <!-- Step 5: Store results -->
  <rect x="210" y="565" width="180" height="75" rx="8" fill="#ECFDF5" stroke="#86EFAC" stroke-width="1.5" filter="url(#sd)"/>
  <text x="300" y="587" text-anchor="middle" font-size="10" font-weight="700" fill="#065F46">5. Store Results</text>
  <text x="220" y="607" font-size="9" fill="#334155">Upload PDF → Cloudflare R2</text>
  <text x="220" y="623" font-size="9" fill="#334155">UPDATE jobs table (Supabase)</text>
  <text x="220" y="635" font-size="9" fill="#334155">status: "completed"</text>

  <!-- Step 6: Realtime push -->
  <rect x="450" y="565" width="160" height="55" rx="8" fill="#ECFDF5" stroke="#86EFAC" stroke-width="1.5" filter="url(#sd)"/>
  <text x="530" y="587" text-anchor="middle" font-size="10" font-weight="700" fill="#065F46">6. Realtime Push</text>
  <text x="460" y="607" font-size="9" fill="#334155">Supabase Realtime →</text>
  <text x="460" y="620" font-size="9" fill="#334155">WebSocket to Flutter</text>

  <line x1="390" y1="590" x2="448" y2="590" stroke="#10B981" stroke-width="2" marker-end="url(#ar-green)"/>

  <!-- Arrow 6→Flutter -->
  <line x1="530" y1="565" x2="530" y2="135" stroke="#10B981" stroke-width="2" marker-end="url(#ar-green)" stroke-dasharray="6,3"/>
  <text x="545" y="350" font-size="9" font-weight="600" fill="#10B981" transform="rotate(-90 545 350)">Push: status "completed"</text>

  <!-- Step 7: Download -->
  <rect x="580" y="95" width="160" height="55" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5" filter="url(#sd)"/>
  <text x="660" y="117" text-anchor="middle" font-size="10" font-weight="700" fill="#1E40AF">7. Download PDF</text>
  <text x="590" y="137" font-size="9" fill="#334155">Presigned R2 URL → direct</text>

  <!-- ==================== FAILURE PATH ==================== -->
  <text x="700" y="345" font-size="13" font-weight="700" fill="#DC2626">Failure Path</text>

  <!-- Circuit breaker open -->
  <rect x="440" y="190" width="170" height="70" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5" filter="url(#sd)"/>
  <text x="525" y="212" text-anchor="middle" font-size="10" font-weight="700" fill="#DC2626">Circuit Breaker OPEN</text>
  <text x="450" y="232" font-size="9" fill="#334155">5 failures in 60s →</text>
  <text x="450" y="248" font-size="9" fill="#334155">Return 503 + retry-after</text>

  <line x1="370" y1="230" x2="438" y2="230" stroke="#EF4444" stroke-width="2" marker-end="url(#ar-red)" stroke-dasharray="4,3"/>
  <text x="405" y="223" text-anchor="middle" font-size="8" font-weight="600" fill="#EF4444">if open</text>

  <!-- RPA failure -->
  <rect x="450" y="440" width="180" height="95" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5" filter="url(#sd)"/>
  <text x="540" y="462" text-anchor="middle" font-size="10" font-weight="700" fill="#DC2626">On RPA Failure</text>
  <text x="460" y="482" font-size="9" fill="#334155">Capture screenshot → R2</text>
  <text x="460" y="498" font-size="9" fill="#334155">Retry 3x (1s, 2s, 4s backoff)</text>
  <text x="460" y="514" font-size="9" fill="#334155">If checksum mismatch →</text>
  <text x="460" y="530" font-size="9" fill="#334155">  try selector v2</text>

  <line x1="390" y1="487" x2="448" y2="487" stroke="#EF4444" stroke-width="2" marker-end="url(#ar-red)" stroke-dasharray="4,3"/>

  <!-- DLQ -->
  <rect x="700" y="440" width="180" height="95" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2" filter="url(#sd)"/>
  <text x="790" y="462" text-anchor="middle" font-size="10" font-weight="700" fill="#DC2626">Dead Letter Queue</text>
  <text x="710" y="482" font-size="9" fill="#334155">After 3 retries exhausted →</text>
  <text x="710" y="498" font-size="9" fill="#334155">Move to DLQ table</text>
  <text x="710" y="514" font-size="9" fill="#334155">Alert: firm admin + ops</text>
  <text x="710" y="530" font-size="9" fill="#334155">Actions: retry / resolve / esc</text>

  <line x1="630" y1="487" x2="698" y2="487" stroke="#EF4444" stroke-width="2" marker-end="url(#ar-red)"/>
  <text x="665" y="479" text-anchor="middle" font-size="8" font-weight="600" fill="#EF4444">3x failed</text>

  <!-- DOM change detection -->
  <rect x="700" y="355" width="180" height="70" rx="8" fill="#FEF9C3" stroke="#FDE047" stroke-width="1.5" filter="url(#sd)"/>
  <text x="790" y="377" text-anchor="middle" font-size="10" font-weight="700" fill="#854D0E">HTML Change Detected</text>
  <text x="710" y="397" font-size="9" fill="#334155">Checksum mismatch →</text>
  <text x="710" y="413" font-size="9" fill="#334155">Auto-create GitHub issue</text>

  <!-- Weekly smoke -->
  <rect x="920" y="355" width="150" height="70" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5" filter="url(#sd)"/>
  <text x="995" y="377" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">Weekly Smoke Test</text>
  <text x="930" y="397" font-size="9" fill="#334155">Login each portal</text>
  <text x="930" y="413" font-size="9" fill="#334155">Validate navigation</text>

  <!-- Portals -->
  <rect x="920" y="460" width="55" height="35" rx="6" fill="#fff" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="947" y="482" text-anchor="middle" font-size="10" font-weight="600" fill="#5B21B6">ITD</text>
  <rect x="985" y="460" width="70" height="35" rx="6" fill="#fff" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="1020" y="482" text-anchor="middle" font-size="10" font-weight="600" fill="#5B21B6">TRACES</text>
  <rect x="920" y="505" width="55" height="35" rx="6" fill="#fff" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="947" y="527" text-anchor="middle" font-size="10" font-weight="600" fill="#5B21B6">EPFO</text>
  <text x="995" y="530" font-size="9" fill="#94A3B8">Govt Portals</text>
</svg>